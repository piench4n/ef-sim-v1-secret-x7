<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex,nofollow">
    <title>Endfield Industrial Planner</title>
    <style>
        :root { 
            /* 共通カラー */
            --accent: #ffcf00; --danger: #ff4444; --warning: #ffae00; --success: #2ecc71;
            /* ダーク */
            --bg: #121416; --panel: #1c1f23; --text: #ffffff; --grid: #2a2d30; 
            --btn-idle: rgba(255, 255, 255, 0.05); /* 未選択時の色 */
            --btn-border: rgba(128, 128, 128, 0.3);
        }
        
        /* ホワイト */
        body.theme-white {
            --bg: #f5f5f5; --panel: #ffffff; --text: #1a1c1e; --grid: #d0d0d0; 
            --btn-idle: rgba(0, 0, 0, 0.03); /* 未選択時の色 */
            --btn-border: rgba(0, 0, 0, 0.1);
        }

        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; transition: background 0.3s, color 0.3s; }
        
        #sidebar { 
            width: 280px; background: var(--panel); border-right: 2px solid rgba(128,128,128,0.2); padding: 20px; 
            display: flex; flex-direction: column; gap: 12px; overflow-y: auto; z-index: 100;
            transition: transform 0.3s ease, background 0.3s;
            -ms-overflow-style: none; scrollbar-width: none;
        }
        #sidebar::-webkit-scrollbar { display: none; }
        body.sidebar-closed #sidebar { transform: translateX(-280px); width: 0; padding: 0; border: none; }

        #toggle-sidebar {
            position: fixed; left: 280px; top: 10px; z-index: 110;
            background: var(--panel); border: 1px solid rgba(128,128,128,0.3); color: var(--accent);
            padding: 8px 12px; cursor: pointer; border-radius: 0 4px 4px 0;
            transition: left 0.3s ease, background 0.3s; font-weight: bold;
        }
        body.sidebar-closed #toggle-sidebar { left: 0; }

        .tool-group { border: 1px solid var(--btn-border); padding: 10px; border-radius: 4px; margin-bottom: 5px; }
        label { font-size: 0.8em; color: var(--accent); font-weight: bold; display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.05em; }
        h2 { margin-top: 0; font-size: 1.1em; border-bottom: 2px solid var(--accent); padding-bottom: 5px; white-space: nowrap; color: var(--accent); }
        
        /* --- ボタンのデザイン調整 --- */
        .tool-btn { 
            width: 100%; padding: 10px; margin: 4px 0; 
            background: var(--btn-idle); /* 通常時は背景に馴染ませる */
            border: 1px solid var(--btn-border); 
            color: var(--text); cursor: pointer; text-align: left; transition: 0.2s; border-radius: 4px; 
            font-size: 0.9em; display: flex; align-items: center; gap: 8px; 
            opacity: 0.8;
        }
        .tool-btn:hover { 
            background: rgba(255, 207, 0, 0.15); 
            border-color: var(--accent);
            opacity: 1;
        }
        .tool-btn.active { 
            background: var(--accent); /* 選択時はイエロー */
            color: #000; font-weight: bold; border-color: var(--accent); 
            opacity: 1;
            box-shadow: 0 0 10px rgba(255, 207, 0, 0.3);
        }
        
        .action-btn { justify-content: center; text-align: center; font-weight: bold; }
        .save-btn { background: var(--success); color: white; border: none; margin-top: 8px !important; opacity: 1; }
        .save-btn:hover { background: #27ae60; }

        .theme-select { width: 100%; padding: 8px; background: var(--bg); color: var(--text); border: 1px solid var(--accent); border-radius: 4px; outline: none; cursor: pointer; font-weight: bold; }

        #main { flex: 1; position: relative; overflow: hidden; background: var(--bg); cursor: crosshair; }
        #main.dragging-map { cursor: grabbing; }
        #main.dragging-item { cursor: move; }
        canvas { display: block; }
        
        .status-bar { 
            position: fixed; bottom: 10px; left: calc(280px + 20px); 
            background: rgba(0,0,0,0.8); padding: 5px 12px; font-size: 12px; border-radius: 4px; 
            z-index: 90; pointer-events: none; transition: left 0.3s ease; 
            border: 1px solid var(--accent); color: var(--accent);
        }
        body.sidebar-closed .status-bar { left: 20px; }

        .controls-hint { font-size: 0.7em; color: #888; line-height: 1.5; background: rgba(128,128,128,0.1); padding: 8px; border-radius: 4px; border-left: 3px solid var(--accent); }
        textarea { width: 100%; height: 60px; background: rgba(0,0,0,0.2); color: var(--accent); border: 1px solid rgba(128,128,128,0.3); font-family: monospace; font-size: 10px; resize: none; margin-top: 5px; padding: 5px; box-sizing: border-box; }
        .warning-text { font-size: 0.65em; color: var(--warning); margin-top: 8px; line-height: 1.4; border-top: 1px dashed rgba(128,128,128,0.3); padding-top: 8px; }
    </style>
</head>
<body>

<button id="toggle-sidebar" onclick="toggleSidebar()">◀</button>

<div id="sidebar">
    <h2>工業設計端末</h2>
    
    <div id="dynamic-tools"><label>設備読み込み中...</label></div>

    <div class="tool-group">
        <label>基本操作</label>
        <button class="tool-btn" onclick="setEraser()" id="btn-eraser"><span>❌</span> 撤去モード</button>
        <button class="tool-btn action-btn" onclick="clearCanvas()" style="color:var(--danger)"><span>🗑</span> 全消去</button>
    </div>

    <div class="tool-group" id="save-area">
        <label>設計図の保存 / 読み込み</label>
        <button class="tool-btn action-btn" onclick="exportData()">📤 コードを書き出す</button>
        <button class="tool-btn action-btn" onclick="importData()">📥 コードから読み込む</button>
        <textarea id="data-text" placeholder="ここに設計図コードが表示されます"></textarea>
        <button class="tool-btn action-btn save-btn" onclick="downloadImage()"><span>💾</span> 画像として保存 (PNG)</button>
        <div class="warning-text">
            ⚠️ <strong>データ消失の注意：</strong><br>
            ・ブラウザの履歴/キャッシュ削除で消えます。<br>
            ・大切な設計図は「書き出し」て保存を推奨。
        </div>
    </div>

    <div class="tool-group">
        <label>テーマ設定</label>
        <select class="theme-select" onchange="changeTheme(this.value)" id="theme-selector">
            <option value="default">ダーク</option>
            <option value="white">ホワイト</option>
        </select>
    </div>
    
    <div class="controls-hint">
        <strong>【操作ヘルプ】</strong><br>
        ・移動：ホイール押し込み<br>
        ・設置/移動：左クリック/ドラッグ<br>
        ・削除：右クリック<br>
        ・ズーム：ホイール(25%~150%)
    </div>
</div>

<div id="main">
    <canvas id="gridCanvas"></canvas>
    <div class="status-bar" id="status">座標: 0, 0 | ズーム: 25%</div>
</div>

<canvas id="exportCanvas" style="display:none;"></canvas>

<script>
    const canvas = document.getElementById('gridCanvas');
    const ctx = canvas.getContext('2d');
    const mainArea = document.getElementById('main');
    const baseGridSize = 30;
    const mapSize = 100;
    
    let scale = 0.25; 
    let offsetX = 0;
    let offsetY = 0;
    let isDraggingMap = false;
    let draggingItem = null;
    let dragStartPos = { x: 0, y: 0 };
    let lastMousePos = { x: 0, y: 0 };
    let placedItems = [];
    let currentTool = null;
    let mouseGrid = { x: 0, y: 0 };

    canvas.width = mapSize * baseGridSize;
    canvas.height = mapSize * baseGridSize;

    function changeTheme(theme) {
        document.body.className = theme === 'default' ? '' : 'theme-' + theme;
        localStorage.setItem('endfield_theme', theme);
    }

    function loadTheme() {
        const savedTheme = localStorage.getItem('endfield_theme') || 'default';
        const selector = document.getElementById('theme-selector');
        if (savedTheme !== 'default' && savedTheme !== 'white') {
            changeTheme('default');
            selector.value = 'default';
        } else {
            selector.value = savedTheme;
            changeTheme(savedTheme);
        }
    }

    function centerMap() {
        const rect = mainArea.getBoundingClientRect();
        const mapPxSize = mapSize * baseGridSize * scale;
        offsetX = (rect.width - mapPxSize) / 2;
        offsetY = (rect.height - mapPxSize) / 2;
        updateStatus();
    }

    function toggleSidebar() {
        document.body.classList.toggle('sidebar-closed');
        const btn = document.getElementById('toggle-sidebar');
        btn.innerText = document.body.classList.contains('sidebar-closed') ? '▶' : '◀';
        setTimeout(centerMap, 310);
    }

    function downloadImage() {
        if (placedItems.length === 0) return alert("設備がありません。");
        const expCanvas = document.getElementById('exportCanvas');
        const expCtx = expCanvas.getContext('2d');
        const res = mapSize * baseGridSize;
        expCanvas.width = res; expCanvas.height = res;
        const styles = getComputedStyle(document.body);
        expCtx.fillStyle = styles.getPropertyValue('--bg').trim();
        expCtx.fillRect(0, 0, res, res);
        expCtx.strokeStyle = styles.getPropertyValue('--grid').trim();
        expCtx.lineWidth = 1;
        for(let i=0; i<=mapSize; i++) {
            expCtx.beginPath(); expCtx.moveTo(i*baseGridSize, 0); expCtx.lineTo(i*baseGridSize, res); expCtx.stroke();
            expCtx.beginPath(); expCtx.moveTo(0, i*baseGridSize); expCtx.lineTo(res, i*baseGridSize); expCtx.stroke();
        }
        placedItems.forEach(item => {
            expCtx.fillStyle = item.color; expCtx.globalAlpha = 0.9;
            expCtx.fillRect(item.x*baseGridSize+1, item.y*baseGridSize+1, item.w*baseGridSize-2, item.h*baseGridSize-2);
            if(item.range > 0) {
                expCtx.strokeStyle = '#ffcf00'; expCtx.lineWidth = 2; expCtx.setLineDash([8, 8]);
                expCtx.strokeRect((item.x-item.range+0.5)*baseGridSize, (item.y-item.range+0.5)*baseGridSize, (item.range*2)*baseGridSize, (item.range*2)*baseGridSize);
                expCtx.setLineDash([]);
            }
        });
        const link = document.createElement('a');
        link.download = `endfield_plan_${new Date().toISOString().slice(0,10)}.png`;
        link.href = expCanvas.toDataURL('image/png');
        link.click();
    }

    function autoLoad() {
        const saved = localStorage.getItem('endfield_save');
        if (saved) try { placedItems = JSON.parse(saved); } catch (e) {}
    }
    function autoSave() { localStorage.setItem('endfield_save', JSON.stringify(placedItems)); }

    function exportData() {
        const code = btoa(unescape(encodeURIComponent(JSON.stringify(placedItems))));
        document.getElementById('data-text').value = code;
        document.getElementById('data-text').select();
        alert("コードを書き出しました。");
    }

    function importData() {
        const code = document.getElementById('data-text').value;
        try {
            const decoded = JSON.parse(decodeURIComponent(escape(atob(code))));
            if (confirm("読み込みますか？")) { placedItems = decoded; autoSave(); }
        } catch (e) { alert("無効なコードです"); }
    }

    async function loadConfig() {
        try {
            const response = await fetch('data.json?t=' + new Date().getTime());
            const data = await response.json();
            renderButtons(data.buildings); 
            autoLoad();
            loadTheme();
            centerMap();
        } catch (err) { document.getElementById('dynamic-tools').innerHTML = "JSONエラー"; }
    }

    function renderButtons(buildings) {
        const container = document.getElementById('dynamic-tools');
        container.innerHTML = '<label>設備一覧</label>';
        buildings.forEach((b, index) => {
            const btn = document.createElement('button');
            btn.className = 'tool-btn';
            btn.id = 'btn-' + b.id;
            btn.innerHTML = `${b.name}`;
            btn.onclick = () => setTool(b);
            container.appendChild(btn);
            if (index === 0) setTool(b);
        });
    }

    function setTool(config) {
        currentTool = config;
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
        if(document.getElementById('btn-' + config.id)) document.getElementById('btn-' + config.id).classList.add('active');
    }

    function setEraser() {
        currentTool = { id: 'eraser' };
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-eraser').classList.add('active');
    }

    function draw() {
        const styles = getComputedStyle(document.body);
        const gridColor = styles.getPropertyValue('--grid').trim();
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.translate(offsetX, offsetY);
        ctx.scale(scale, scale);
        const fullSize = mapSize * baseGridSize;
        ctx.strokeStyle = gridColor; ctx.lineWidth = 1/scale;
        for(let i=0; i<=mapSize; i++) {
            ctx.beginPath(); ctx.moveTo(i*baseGridSize, 0); ctx.lineTo(i*baseGridSize, fullSize); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i*baseGridSize); ctx.lineTo(fullSize, i*baseGridSize); ctx.stroke();
        }
        placedItems.forEach(item => {
            ctx.fillStyle = item.color; ctx.globalAlpha = (item === draggingItem) ? 0.3 : 0.8;
            ctx.fillRect(item.x*baseGridSize+1, item.y*baseGridSize+1, item.w*baseGridSize-2, item.h*baseGridSize-2);
            if(item.range > 0) {
                ctx.strokeStyle = '#ffcf00'; ctx.lineWidth = 2/scale; ctx.setLineDash([5/scale, 5/scale]);
                ctx.strokeRect((item.x-item.range+0.5)*baseGridSize, (item.y-item.range+0.5)*baseGridSize, (item.range*2)*baseGridSize, (item.range*2)*baseGridSize);
                ctx.setLineDash([]);
            }
        });
        if(currentTool && currentTool.id !== 'eraser' && !draggingItem) {
            ctx.globalAlpha = 0.4;
            const occupied = isAreaOccupied(mouseGrid.x, mouseGrid.y, currentTool.w, currentTool.h);
            ctx.fillStyle = occupied ? 'red' : currentTool.color;
            ctx.fillRect(mouseGrid.x*baseGridSize, mouseGrid.y*baseGridSize, currentTool.w*baseGridSize, currentTool.h*baseGridSize);
        }
        if(draggingItem) {
            ctx.globalAlpha = 0.6;
            const occupied = isAreaOccupied(mouseGrid.x, mouseGrid.y, draggingItem.w, draggingItem.h, draggingItem);
            ctx.fillStyle = occupied ? 'red' : draggingItem.color;
            ctx.fillRect(mouseGrid.x*baseGridSize, mouseGrid.y*baseGridSize, draggingItem.w*baseGridSize, draggingItem.h*baseGridSize);
        }
        ctx.globalAlpha = 1.0;
        requestAnimationFrame(draw);
    }

    function isAreaOccupied(x, y, w, h, ignoreItem = null) {
        return placedItems.some(item => {
            if (item === ignoreItem) return false;
            return x < item.x + item.w && x + w > item.x && y < item.y + item.h && y + h > item.y;
        });
    }

    mainArea.addEventListener('mousedown', (e) => {
        if (e.button === 1) { isDraggingMap = true; lastMousePos = { x: e.clientX, y: e.clientY }; mainArea.classList.add('dragging-map'); return; }
        if (e.button === 0) {
            const target = placedItems.find(item => mouseGrid.x >= item.x && mouseGrid.x < item.x + item.w && mouseGrid.y >= item.y && mouseGrid.y < item.y + item.h);
            if (currentTool && currentTool.id === 'eraser') { if (target) { placedItems = placedItems.filter(i => i !== target); autoSave(); }
            } else if (target) { draggingItem = target; dragStartPos = { x: target.x, y: target.y }; mainArea.classList.add('dragging-item');
            } else if (currentTool) {
                const occupied = isAreaOccupied(mouseGrid.x, mouseGrid.y, currentTool.w, currentTool.h);
                if (!occupied) { placedItems.push({ ...currentTool, x: mouseGrid.x, y: mouseGrid.y }); autoSave(); }
            }
        }
        if (e.button === 2) { placedItems = placedItems.filter(item => !(mouseGrid.x >= item.x && mouseGrid.x < item.x + item.w && mouseGrid.y >= item.y && mouseGrid.y < item.y + item.h)); autoSave(); }
    });

    window.addEventListener('mousemove', (e) => {
        const rect = mainArea.getBoundingClientRect();
        const mx = e.clientX - rect.left; const my = e.clientY - rect.top;
        if (isDraggingMap) { offsetX += e.clientX - lastMousePos.x; offsetY += e.clientY - lastMousePos.y; lastMousePos = { x: e.clientX, y: e.clientY }; }
        const worldX = (mx - offsetX) / scale; const worldY = (my - offsetY) / scale;
        mouseGrid.x = Math.floor(worldX / baseGridSize); mouseGrid.y = Math.floor(worldY / baseGridSize);
        updateStatus();
    });

    window.addEventListener('mouseup', () => {
        if (draggingItem) {
            const occupied = isAreaOccupied(mouseGrid.x, mouseGrid.y, draggingItem.w, draggingItem.h, draggingItem);
            if (!occupied) { draggingItem.x = mouseGrid.x; draggingItem.y = mouseGrid.y; }
            else { draggingItem.x = dragStartPos.x; draggingItem.y = dragStartPos.y; }
            draggingItem = null; autoSave();
        }
        isDraggingMap = false; mainArea.classList.remove('dragging-map', 'dragging-item');
    });

    mainArea.addEventListener('contextmenu', e => e.preventDefault());
    mainArea.addEventListener('wheel', (e) => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? -0.05 : 0.05;
        const newScale = Math.min(Math.max(0.25, scale + delta), 1.5);
        if (newScale !== scale) {
            const rect = mainArea.getBoundingClientRect();
            const mx = e.clientX - rect.left; const my = e.clientY - rect.top;
            offsetX -= (mx - offsetX) * (newScale / scale - 1);
            offsetY -= (my - offsetY) * (newScale / scale - 1);
            scale = newScale; updateStatus();
        }
    }, { passive: false });

    function updateStatus() { document.getElementById('status').innerText = `座標: ${mouseGrid.x}, ${mouseGrid.y} | ズーム: ${Math.round(scale * 100)}%`; }
    function clearCanvas() { if(confirm('全て消去しますか？')) { placedItems = []; autoSave(); } }
    
    window.addEventListener('resize', centerMap);
    loadConfig(); draw();
</script>
</body>
</html>
