<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex,nofollow">
    <title>Endfield Industrial Planner - Save System</title>
    <style>
        :root { --bg: #1a1c1e; --panel: #2d2f31; --accent: #ffcf00; --text: #e0e0e0; --danger: #ff6b6b; --warning: #ffae00; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* サイドバー */
        #sidebar { width: 280px; background: var(--panel); border-right: 2px solid #444; padding: 20px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; z-index: 100; }
        .tool-group { border: 1px solid #555; padding: 10px; border-radius: 4px; margin-bottom: 10px; }
        label { font-size: 0.8em; color: var(--accent); font-weight: bold; display: block; margin-bottom: 5px; }
        
        /* ボタン類 */
        .tool-btn { width: 100%; padding: 10px; margin: 4px 0; background: #3d3f41; border: 1px solid #555; color: white; cursor: pointer; text-align: left; transition: 0.2s; border-radius: 4px; font-size: 0.9em; }
        .tool-btn:hover { background: #4d4f51; }
        .tool-btn.active { background: var(--accent); color: black; font-weight: bold; }
        .action-btn { background: #4a4d50; border: 1px solid #666; text-align: center; }
        .action-btn:active { background: #5a5d60; }

        /* メインエリア */
        #main { flex: 1; position: relative; overflow: hidden; background: #111; cursor: crosshair; }
        #main.dragging-map { cursor: grabbing; }
        #main.dragging-item { cursor: move; }
        canvas { display: block; }
        
        /* 情報表示 */
        .status-bar { position: fixed; bottom: 10px; left: 290px; background: rgba(0,0,0,0.7); padding: 5px 10px; font-size: 12px; border-radius: 4px; z-index: 100; pointer-events: none; }
        .controls-hint { font-size: 0.7em; color: #888; line-height: 1.5; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 4px; }
        
        /* 保存用エリアと注意書き */
        #save-area { margin-top: 10px; }
        textarea { width: 100%; height: 60px; background: #111; color: #0f0; border: 1px solid #444; font-family: monospace; font-size: 10px; resize: none; margin-top: 5px; padding: 5px; box-sizing: border-box; }
        .warning-text { font-size: 0.65em; color: var(--warning); margin-top: 8px; line-height: 1.4; border-top: 1px dashed #555; padding-top: 8px; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>工業設計端末</h2>
    
    <div id="dynamic-tools"><label>設備読み込み中...</label></div>

    <div class="tool-group">
        <label>基本操作</label>
        <button class="tool-btn" onclick="setEraser()" id="btn-eraser">❌ 撤去モード</button>
        <button class="tool-btn action-btn" onclick="clearCanvas()" style="color:var(--danger)">🗑 全消去</button>
    </div>

    <div class="tool-group" id="save-area">
        <label>設計図の保存 / 読込</label>
        <button class="tool-btn action-btn" onclick="exportData()">📤 コードを書き出す</button>
        <button class="tool-btn action-btn" onclick="importData()">📥 コードから読み込む</button>
        <textarea id="data-text" placeholder="ここに設計図コードが表示されます"></textarea>
        
        <div class="warning-text">
            ⚠️ <strong>データ消失の注意：</strong><br>
            ・ブラウザの履歴/キャッシュ削除でデータが消えます。<br>
            ・シークレットモードでは保存されません。<br>
            ・大切な設計図は「書き出し」てバックアップを推奨。
        </div>
    </div>
    
    <div class="controls-hint">
        <strong>【操作ヘルプ】</strong><br>
        ・移動：ホイール押し込み<br>
        ・設置/移動：左クリック/ドラッグ<br>
        ・削除：右クリック<br>
        ・ズーム：ホイール(30%~150%)
    </div>
</div>

<div id="main">
    <canvas id="gridCanvas"></canvas>
    <div class="status-bar" id="status">座標: 0, 0 | ズーム: 100%</div>
</div>

<script>
    const canvas = document.getElementById('gridCanvas');
    const ctx = canvas.getContext('2d');
    const mainArea = document.getElementById('main');
    const baseGridSize = 30;
    const mapSize = 100;
    
    let scale = 1.0;
    let offsetX = 0;
    let offsetY = 0;
    let isDraggingMap = false;
    let draggingItem = null;
    let dragStartPos = { x: 0, y: 0 };
    let lastMousePos = { x: 0, y: 0 };
    
    let placedItems = [];
    let currentTool = null;
    let mouseGrid = { x: 0, y: 0 };

    canvas.width = mapSize * baseGridSize;
    canvas.height = mapSize * baseGridSize;

    function autoLoad() {
        const saved = localStorage.getItem('endfield_save');
        if (saved) {
            try {
                placedItems = JSON.parse(saved);
            } catch (e) { console.error("ロード失敗", e); }
        }
    }

    function autoSave() {
        localStorage.setItem('endfield_save', JSON.stringify(placedItems));
    }

    function exportData() {
        const code = btoa(unescape(encodeURIComponent(JSON.stringify(placedItems))));
        document.getElementById('data-text').value = code;
        document.getElementById('data-text').select();
        alert("コードを書き出しました。テキストエリアのコードをコピーして保存してください。");
    }

    function importData() {
        const code = document.getElementById('data-text').value;
        if (!code) return alert("コードを入力してください");
        try {
            const decoded = JSON.parse(decodeURIComponent(escape(atob(code))));
            if (confirm("現在の配置を上書きして読み込みますか？")) {
                placedItems = decoded;
                autoSave();
            }
        } catch (e) {
            alert("無効なコードです");
        }
    }

    async function loadConfig() {
        try {
            const response = await fetch('data.json?t=' + new Date().getTime());
            const data = await response.json();
            renderButtons(data.buildings);
            autoLoad();
        } catch (err) {
            document.getElementById('dynamic-tools').innerHTML = "JSONエラー";
        }
    }

    function renderButtons(buildings) {
        const container = document.getElementById('dynamic-tools');
        container.innerHTML = '<label>登録済み設備</label>';
        buildings.forEach((b, index) => {
            const btn = document.createElement('button');
            btn.className = 'tool-btn';
            btn.id = 'btn-' + b.id;
            btn.innerHTML = `${b.name}`;
            btn.onclick = () => setTool(b);
            container.appendChild(btn);
            if (index === 0) setTool(b);
        });
    }

    function setTool(config) {
        currentTool = config;
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
        if(document.getElementById('btn-' + config.id)) document.getElementById('btn-' + config.id).classList.add('active');
    }

    function setEraser() {
        currentTool = { id: 'eraser' };
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-eraser').classList.add('active');
    }

    function draw() {
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.translate(offsetX, offsetY);
        ctx.scale(scale, scale);

        const fullSize = mapSize * baseGridSize;
        ctx.strokeStyle = '#222';
        ctx.lineWidth = 1 / scale;

        for(let i=0; i<=mapSize; i++) {
            ctx.beginPath(); ctx.moveTo(i * baseGridSize, 0); ctx.lineTo(i * baseGridSize, fullSize); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i * baseGridSize); ctx.lineTo(fullSize, i * baseGridSize); ctx.stroke();
        }

        placedItems.forEach(item => {
            ctx.fillStyle = item.color;
            ctx.globalAlpha = item === draggingItem ? 0.3 : 0.8;
            ctx.fillRect(item.x*baseGridSize+1, item.y*baseGridSize+1, item.w*baseGridSize-2, item.h*baseGridSize-2);
            if(item.range > 0) {
                ctx.strokeStyle = '#ffcf00';
                ctx.setLineDash([5 / scale, 5 / scale]);
                ctx.strokeRect((item.x - item.range + 0.5)*baseGridSize, (item.y - item.range + 0.5)*baseGridSize, (item.range*2)*baseGridSize, (item.range*2)*baseGridSize);
                ctx.setLineDash([]);
            }
        });

        if(currentTool && currentTool.id !== 'eraser' && !draggingItem) {
            ctx.globalAlpha = 0.4;
            const occupied = isAreaOccupied(mouseGrid.x, mouseGrid.y, currentTool.w, currentTool.h);
            ctx.fillStyle = occupied ? 'red' : currentTool.color;
            ctx.fillRect(mouseGrid.x*baseGridSize, mouseGrid.y*baseGridSize, currentTool.w*baseGridSize, currentTool.h*baseGridSize);
        }
        
        if(draggingItem) {
            ctx.globalAlpha = 0.6;
            const occupied = isAreaOccupied(mouseGrid.x, mouseGrid.y, draggingItem.w, draggingItem.h, draggingItem);
            ctx.fillStyle = occupied ? 'red' : draggingItem.color;
            ctx.fillRect(mouseGrid.x*baseGridSize, mouseGrid.y*baseGridSize, draggingItem.w*baseGridSize, draggingItem.h*baseGridSize);
        }

        ctx.globalAlpha = 1.0;
        requestAnimationFrame(draw);
    }

    function isAreaOccupied(x, y, w, h, ignoreItem = null) {
        return placedItems.some(item => {
            if (item === ignoreItem) return false;
            return x < item.x + item.w && x + w > item.x && y < item.y + item.h && y + h > item.y;
        });
    }

    mainArea.addEventListener('mousedown', (e) => {
        if (e.button === 1) {
            isDraggingMap = true;
            lastMousePos = { x: e.clientX, y: e.clientY };
            mainArea.classList.add('dragging-map');
            return;
        }

        if (e.button === 0) {
            const target = placedItems.find(item => mouseGrid.x >= item.x && mouseGrid.x < item.x + item.w && mouseGrid.y >= item.y && mouseGrid.y < item.y + item.h);
            
            if (currentTool && currentTool.id === 'eraser') {
                if (target) {
                    placedItems = placedItems.filter(i => i !== target);
                    autoSave();
                }
            } else if (target) {
                draggingItem = target;
                dragStartPos = { x: target.x, y: target.y };
                mainArea.classList.add('dragging-item');
            } else if (currentTool) {
                const occupied = isAreaOccupied(mouseGrid.x, mouseGrid.y, currentTool.w, currentTool.h);
                if (!occupied) {
                    placedItems.push({ ...currentTool, x: mouseGrid.x, y: mouseGrid.y });
                    autoSave();
                }
            }
        }

        if (e.button === 2) {
            placedItems = placedItems.filter(item => !(mouseGrid.x >= item.x && mouseGrid.x < item.x + item.w && mouseGrid.y >= item.y && mouseGrid.y < item.y + item.h));
            autoSave();
        }
    });

    window.addEventListener('mousemove', (e) => {
        const rect = mainArea.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;

        if (isDraggingMap) {
            offsetX += e.clientX - lastMousePos.x;
            offsetY += e.clientY - lastMousePos.y;
            lastMousePos = { x: e.clientX, y: e.clientY };
        }

        const worldX = (mx - offsetX) / scale;
        const worldY = (my - offsetY) / scale;
        mouseGrid.x = Math.floor(worldX / baseGridSize);
        mouseGrid.y = Math.floor(worldY / baseGridSize);
        updateStatus();
    });

    window.addEventListener('mouseup', () => {
        if (draggingItem) {
            const occupied = isAreaOccupied(mouseGrid.x, mouseGrid.y, draggingItem.w, draggingItem.h, draggingItem);
            if (!occupied) {
                draggingItem.x = mouseGrid.x;
                draggingItem.y = mouseGrid.y;
            } else {
                draggingItem.x = dragStartPos.x;
                draggingItem.y = dragStartPos.y;
            }
            draggingItem = null;
            autoSave();
        }
        isDraggingMap = false;
        mainArea.classList.remove('dragging-map', 'dragging-item');
    });

    mainArea.addEventListener('contextmenu', e => e.preventDefault());

    mainArea.addEventListener('wheel', (e) => {
        e.preventDefault();
        const zoomSpeed = 0.12;
        const delta = e.deltaY > 0 ? -zoomSpeed : zoomSpeed;
        const newScale = Math.min(Math.max(0.3, scale + delta), 1.5);
        if (newScale !== scale) {
            const rect = mainArea.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            offsetX -= (mx - offsetX) * (newScale / scale - 1);
            offsetY -= (my - offsetY) * (newScale / scale - 1);
            scale = newScale;
            updateStatus();
        }
    }, { passive: false });

    function updateStatus() {
        document.getElementById('status').innerText = `座標: ${mouseGrid.x}, ${mouseGrid.y} | ズーム: ${Math.round(scale * 100)}%`;
    }

    function clearCanvas() { 
        if(confirm('全て消去しますか？')) {
            placedItems = [];
            autoSave();
        }
    }
    
    loadConfig();
    draw();
</script>
</body>
</html>
