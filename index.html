<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex,nofollow">
    <title>Endfield Industrial Planner</title>
    <style>
        :root { 
            --accent: #ffcf00; --danger: #ff4444; --warning: #ffae00; --success: #2ecc71;
            --bg: #121416; --panel: #1c1f23; --text: #ffffff; --grid: #2a2d30; 
            --btn-idle: rgba(255, 255, 255, 0.05);
            --btn-border: rgba(128, 128, 128, 0.3);
            --sidebar-w: 280px;
            --text-outline: none;
            --tooltip-bg: rgba(0, 0, 0, 0.9);
        }
        
        body.theme-white {
            --bg: #f5f5f5; --panel: #ffffff; --text: #1a1c1e; --grid: #d0d0d0; 
            --btn-idle: rgba(0, 0, 0, 0.03);
            --btn-border: rgba(0, 0, 0, 0.1);
            --text-outline: -1px -1px 0 rgba(0,0,0,0.4), 1px -1px 0 rgba(0,0,0,0.4), -1px 1px 0 rgba(0,0,0,0.4), 1px 1px 0 rgba(0,0,0,0.4), 0px 0px 2px rgba(0,0,0,0.5);
            --tooltip-bg: rgba(50, 50, 50, 0.9);
        }

        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; transition: background 0.3s, color 0.3s; }
        
        #sidebar { 
            width: var(--sidebar-w); min-width: var(--sidebar-w); background: var(--panel); border-right: 2px solid rgba(128,128,128,0.2); padding: 20px; 
            display: flex; flex-direction: column; gap: 12px; overflow-y: auto; z-index: 100;
            transition: margin-left 0.3s ease, opacity 0.3s ease;
            -ms-overflow-style: none; scrollbar-width: none; box-sizing: border-box;
        }
        #sidebar::-webkit-scrollbar { display: none; }
        body.sidebar-closed #sidebar { margin-left: calc(var(--sidebar-w) * -1); opacity: 0; pointer-events: none; }

        #toggle-sidebar {
            position: fixed; left: var(--sidebar-w); top: 10px; z-index: 110;
            background: var(--panel); border: 1px solid rgba(128,128,128,0.3); color: var(--accent);
            padding: 8px 12px; cursor: pointer; border-radius: 0 4px 4px 0;
            transition: left 0.3s ease; font-weight: bold; text-shadow: var(--text-outline);
        }
        body.sidebar-closed #toggle-sidebar { left: 0; }

        .tool-group { border: 1px solid var(--btn-border); padding: 10px; border-radius: 4px; margin-bottom: 5px; text-align: left; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 4px 0; }

        label { font-size: 0.8em; color: var(--accent); font-weight: bold; display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.05em; text-shadow: var(--text-outline); }
        h2 { margin-top: 0; font-size: 1.1em; border-bottom: 2px solid var(--accent); padding-bottom: 5px; white-space: nowrap; color: var(--accent); text-shadow: var(--text-outline); }
        
        /* 統計パネル */
        #summary-panel { font-size: 0.85em; line-height: 1.6; border-left: 3px solid var(--accent); padding-left: 10px; margin-bottom: 10px; }
        .summary-item { display: flex; justify-content: space-between; }
        .val-stat { color: var(--accent); }

        /* カテゴリ切替 */
        .cat-container { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
        .cat-btn { font-size: 0.7em; padding: 4px 8px; background: var(--btn-idle); border: 1px solid var(--btn-border); color: var(--text); border-radius: 3px; cursor: pointer; }
        .cat-btn.active { background: var(--accent); color: #000; font-weight: bold; }

        .tool-btn { 
            width: 100%; padding: 8px 10px; margin: 2px 0; 
            background: var(--btn-idle); border: 1px solid var(--btn-border); 
            color: var(--text); cursor: pointer; text-align: left;
            transition: 0.2s; border-radius: 4px; 
            font-size: 0.8em; display: flex; align-items: center; justify-content: space-between;
            opacity: 0.8; box-sizing: border-box; white-space: nowrap; position: relative;
        }
        .tool-btn:hover { background: rgba(255, 207, 0, 0.15); border-color: var(--accent); opacity: 1; }
        .tool-btn.active { background: var(--accent); color: #000; font-weight: bold; border-color: var(--accent); opacity: 1; box-shadow: 0 0 10px rgba(255, 207, 0, 0.3); }
        
        .count-badge { font-size: 0.9em; opacity: 0.6; margin-left: auto; padding-right: 4px; }
        .tool-btn.active .count-badge { color: #000; opacity: 1; }

        .tool-btn::after {
            content: attr(data-size); font-size: 9px; background: var(--tooltip-bg); color: #fff; padding: 2px 5px;
            border-radius: 3px; border: 1px solid var(--accent); opacity: 0; transition: 0.2s;
            pointer-events: none; position: absolute; right: 5px; font-weight: normal; text-shadow: none;
        }
